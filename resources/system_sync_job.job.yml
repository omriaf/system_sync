resources:
  jobs:
    system_sync_daily:
      name: system_tables_daily_sync_job
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: run_sync_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.system_sync_etl.id}
            full_refresh: true
