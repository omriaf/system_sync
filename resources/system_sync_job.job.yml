resources:
  jobs:
    system_sync_daily:
      name: system_tables_daily_sync_job
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: create_catalog
          notebook_task:
            notebook_path: ../src/create_catalog.sql
            warehouse_id: ${var.warehouse_id}

        - task_key: run_sync_pipeline
          depends_on:
            - task_key: create_catalog
          pipeline_task:
            pipeline_id: ${resources.pipelines.system_sync_etl.id}
            full_refresh: true
