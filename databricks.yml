bundle:
  name: system_sync

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production

variables:
  warehouse_id:
    description: SQL warehouse ID for the dashboard and catalog creation task
    # Replace with your SQL warehouse ID, or pass via CLI: --var="warehouse_id=<id>"
    default: <My Warehouse ID>    # <-- replace with your warehouse ID
