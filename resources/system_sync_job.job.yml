resources:
  jobs:
    system_sync_daily:
      name: system_tables_daily_sync_job
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: run_sync_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.system_sync_etl.id}
            full_refresh: true

        - task_key: refresh_dashboard
          depends_on:
            - task_key: run_sync_pipeline
          dashboard_task:
            dashboard_id: ${resources.dashboards.usage_dashboard.id}
            warehouse_id: ${var.warehouse_id}
